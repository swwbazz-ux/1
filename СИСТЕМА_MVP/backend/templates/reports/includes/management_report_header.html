<header class="management-dashboard-header">
    <div class="management-dashboard-header-title">
        <span>Руководство MVP</span>
        <h1>{{ title }}</h1>
        <p>{{ subtitle }}</p>
    </div>
    <div class="management-dashboard-header-meta" aria-label="Параметры раздела">
        <div>
            <span>Раздел</span>
            <strong>{{ title }}</strong>
        </div>
        <div>
            <span>Сформировано</span>
            <strong>{% now "d.m.Y H:i" %}</strong>
        </div>
    </div>
    <div class="management-dashboard-header-actions">
        <button type="button" class="management-dashboard-theme" data-dispatcher-theme-toggle data-theme-icon="moon" aria-label="Включить дневную тему" title="Дневной режим"></button>
        <a href="{% url 'role_home' %}">Главная</a>
        <a href="{% url 'logout' %}">Выйти</a>
    </div>
</header>

<div class="dispatcher-analytics-toolbar">
    <nav class="dispatcher-subnav" aria-label="Разделы витрины руководства">
        <a class="{% if active == 'summary' %}is-active{% endif %}" href="{% url 'management_dashboard' %}">Сводка</a>
        <a class="{% if active == 'shift_analytics' %}is-active{% endif %}" href="{% url 'shift_analytics_report' %}">Смена</a>
        <a class="{% if active == 'dynamics' %}is-active{% endif %}" href="{% url 'management_dynamics' %}">Динамика</a>
        <a class="{% if active == 'daily' %}is-active{% endif %}" href="{% url 'customer_daily_report' %}">Сутки</a>
        <a class="{% if active == 'volume' %}is-active{% endif %}" href="{% url 'volume_report' %}">Объемы</a>
        <a class="{% if active == 'downtime' %}is-active{% endif %}" href="{% url 'downtime_report' %}">Простои</a>
        <a class="{% if active == 'mechanic' %}is-active{% endif %}" href="{% url 'mechanic_dashboard' %}">Механики</a>
        <a class="{% if active == 'pilot' %}is-active{% endif %}" href="{% url 'pilot_report_checklist' %}">Пилот</a>
        <a class="{% if active == 'feedback' %}is-active{% endif %}" href="{% url 'pilot_feedback' %}">Замечания</a>
    </nav>
    <div class="dispatcher-report-actions">
        {% if export_url %}
            <a href="{{ export_url }}">Excel</a>
        {% endif %}
        <button type="button" onclick="window.print()">Печать</button>
    </div>
</div>
