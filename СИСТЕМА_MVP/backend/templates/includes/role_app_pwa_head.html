{% load static %}
<link rel="manifest" href="{{ manifest_url }}">
<meta name="theme-color" content="{{ theme_color }}">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="{{ apple_title }}">
<link rel="apple-touch-icon" sizes="180x180" href="{% static icon_180 %}">
<meta name="role-app-service-worker" content="{{ service_worker_url }}">
<meta name="role-app-scope" content="{% if role_app.role_code == role_code %}/{% else %}{{ legacy_scope }}{% endif %}">
<script src="{% static 'js/role-app-pwa-v1.js' %}" defer></script>
