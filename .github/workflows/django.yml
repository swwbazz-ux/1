name: Django MVP checks

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    name: Django check and tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: СИСТЕМА_MVP/backend

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: СИСТЕМА_MVP/backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare media directories
        run: mkdir -p media/employee_photos

      - name: Django system check
        run: python manage.py check

      - name: Run user module tests
        run: python manage.py test users
